<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MCR Equipment Services</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#050505;
  color:#fff;
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* GRID BG */
body::before {
  content:"";
  position:fixed;
  width:100%; height:100%;
  background:
    linear-gradient(rgba(255,45,45,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,45,45,0.04) 1px, transparent 1px);
  background-size:35px 35px;
  z-index:-2;
}

/* HEADER */
header {
  position:fixed;
  width:100%;
  padding:12px 30px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(8px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:100;
}

header h1 {
  font-family:'Oswald';
  font-size:1.1rem;
}

header span { color:#ff2d2d; }

/* HERO */
.hero {
  height:85vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

.hero h2 {
  font-family:'Oswald';
  font-size:3rem;
}

.hero span { color:#ff2d2d; }

.hero p {
  margin-top:10px;
  color:#aaa;
  max-width:500px;
}

/* BUTTON */
.btn {
  display:inline-block;
  margin-top:18px;
  padding:12px 28px;
  background:#ff2d2d;
  color:white;
  text-decoration:none;
  font-weight:bold;
  border-radius:4px;
}

.btn:hover {
  background:#ff4d4d;
}

/* SECTION */
.section {
  padding:60px 15px;
  text-align:center;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
  margin-top:25px;
}

/* CARD */
.card {
  background:#0f0f0f;
  padding:22px;
  border:1px solid #1a1a1a;
  cursor:pointer;
  transition:0.3s;
  position:relative;
}

.card::before {
  content:"";
  position:absolute;
  height:3px;
  width:100%;
  background:#ff2d2d;
  top:0;
  left:0;
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 8px 25px rgba(255,45,45,0.15);
}

/* MODAL */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
  z-index:200;
}

.modal.active {
  opacity:1;
  pointer-events:auto;
}

.modal-content {
  background:#0d0d0d;
  padding:30px;
  max-width:500px;
  width:90%;
  border:1px solid #222;
  position:relative;
}

.modal-content h3 {
  font-family:'Oswald';
  margin-bottom:10px;
}

.modal-content p {
  color:#bbb;
}

.close {
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:20px;
  color:#999;
}

.close:hover { color:#fff; }

/* CONTACT */
.phone {
  font-size:1.8rem;
  color:#ff2d2d;
  margin-top:10px;
}

footer {
  padding:20px;
  text-align:center;
  color:#444;
}

</style>
</head>

<body>

<header>
  <h1>MCR <span>Equipment</span></h1>
</header>

<section class="hero">
  <div>
    <h2>Mobile <span>Equipment Repair</span></h2>
    <p>Fast, reliable on-site repair for heavy equipment.</p>
    <a href="tel:17073208990" class="btn">Call Now</a>
  </div>
</section>

<section class="section">
  <h2>Services</h2>

  <div class="grid">
    <div class="card" onclick="openModal('repair')">Equipment Repair</div>
    <div class="card" onclick="openModal('pm')">Preventative Maintenance</div>
    <div class="card" onclick="openModal('hydraulic')">Hydraulics</div>
    <div class="card" onclick="openModal('forklift')">Forklifts & Generators</div>
  </div>
</section>

<section class="section">
  <h2>Get Service Now</h2>
  <div class="phone">707-320-8990</div>
</section>

<footer>© MCR Equipment Services</footer>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="close" onclick="closeModal()">✕</div>
    <h3 id="modalTitle"></h3>
    <p id="modalText"></p>
  </div>
</div>

<script>

function openModal(type){
  const modal = document.getElementById('modal');
  const title = document.getElementById('modalTitle');
  const text = document.getElementById('modalText');

  if(type === 'repair'){
    title.innerText = "Equipment Repair";
    text.innerText = "Full diagnostics and repair for heavy equipment. Fast response and on-site service to minimize downtime.";
  }

  if(type === 'pm'){
    title.innerText = "Preventative Maintenance";
    text.innerText = "Scheduled maintenance services to keep your equipment running efficiently and prevent costly breakdowns.";
  }

  if(type === 'hydraulic'){
    title.innerText = "Hydraulic Services";
    text.innerText = "Hydraulic hose repair, replacement, and system diagnostics to keep your machines operating at full power.";
  }

  if(type === 'forklift'){
    title.innerText = "Forklifts & Generators";
    text.innerText = "Repair and maintenance for forklifts and generators, ensuring reliability in warehouse and field operations.";
  }

  modal.classList.add('active');
}

function closeModal(){
  document.getElementById('modal').classList.remove('active');
}

/* CLOSE ON BACKGROUND CLICK */
document.getElementById('modal').addEventListener('click', function(e){
  if(e.target.id === 'modal'){
    closeModal();
  }
});

</script>

</body>
</html>
